<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO esencial -->
  <title>{% block meta_title %}{{ meta_title }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{{ meta_description }}{% endblock %}">
  <link rel="canonical" href="{% block canonical %}{{ canonical_url }}{% endblock %}">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <meta name="theme-color" content="#042C53">

  <!-- Geo / idioma -->
  <meta name="geo.region" content="CL">
  <meta name="geo.country" content="Chile">
  <meta name="language" content="es-CL">
  <link rel="alternate" hreflang="es-CL" href="{{ canonical_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}Cotizar Isapre Gratis en Chile 2026 | AsesoríasIsapres.com{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}Diagnóstico gratuito en 60 segundos. Compara todas las isapres de Chile según tu sueldo, edad y clínica preferente.{% endblock %}">
  <meta property="og:image" content="{% block og_image %}{{ og_image }}{% endblock %}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="AsesoríasIsapres.com — Cotiza y compara isapres gratis en Chile">
  <meta property="og:url" content="{{ canonical_url }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_CL">
  <meta property="og:site_name" content="AsesoríasIsapres.com">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@asesoriasisapres">
  <meta name="twitter:title" content="Cotiza tu Isapre Gratis en Chile — Asesoría Personalizada">
  <meta name="twitter:description" content="Diagnóstico en 60 segundos. Compara todas las isapres y ahorra.">
  <meta name="twitter:image" content="{{ og_image }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link rel="apple-touch-icon" href="/static/img/favicon.svg">

  <!-- Sitemap hint -->
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">

  <!-- Fuente Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

  <!-- CSS crítico -->
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">

  {% block extra_head %}{% endblock %}
</head>
<body>

{% block body %}{% endblock %}

<!-- JS -->
<script src="{% static 'js/diagnostico.js' %}" defer></script>

<!-- Schema.org -->
{% block schema %}{% endblock %}

{% block extra_scripts %}{% endblock %}

{% if tawkto_id %}<div id="tawkto-cfg" data-id="{{ tawkto_id }}" hidden></div>{% endif %}
</body>
</html>
